<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="UB11 Briefing"/>
<title>UB11 Shift Briefing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f2f2f7;min-height:100vh;display:flex;justify-content:center;padding:0}
#root{width:100%;max-width:430px;min-height:100vh;background:#fff;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}

/* PASSWORD */
.pw-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:0}
.pw-logo{width:64px;height:64px;border-radius:16px;background:#1a56a0;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.pw-logo-text{font-size:18px;font-weight:700;color:#fff;letter-spacing:2px}
.pw-title{font-size:22px;font-weight:700;color:#111;margin-bottom:6px}
.pw-sub{font-size:14px;color:#888;margin-bottom:28px;text-align:center}
.pw-dots{display:flex;gap:14px;margin-bottom:28px}
.pw-dot{width:16px;height:16px;border-radius:50%;border:2px solid #ccc;background:#fff;transition:all .15s}
.pw-dot.filled{background:#1a56a0;border-color:#1a56a0}
.pw-dot.error{background:#E24B4A;border-color:#E24B4A}
.pw-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px}
.pw-key{padding:18px 8px;border-radius:12px;border:1.5px solid #e5e5e5;font-size:22px;font-weight:600;color:#111;background:#fafafa;transition:all .1s;active:scale(.95)}
.pw-key:active{background:#E6F1FB;border-color:#378ADD}
.pw-key.del{font-size:18px;color:#888}
.pw-error{font-size:13px;color:#E24B4A;margin-top:-16px;margin-bottom:8px;min-height:18px}

/* TOP BAR */
.topbar{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;color:#111}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.change-btn{font-size:12px;padding:4px 12px;border-radius:20px;background:#E6F1FB;color:#185FA5;font-weight:500;border:none}
.prog-bar-wrap{height:3px;background:#f0f0f0;flex-shrink:0}
.prog-bar{height:3px;background:#378ADD;transition:width .3s;width:0%}

/* SHIFT PICK */
.shift-pick-body{padding:24px 20px;display:flex;flex-direction:column;gap:14px;flex:1}
.pick-title{font-size:20px;font-weight:700;color:#111;margin-bottom:4px}
.pick-sub{font-size:13px;color:#888;margin-bottom:8px}
.shift-big-btn{padding:18px 16px;border:1.5px solid #e5e5e5;border-radius:14px;text-align:left;background:#fafafa;transition:all .15s;display:flex;align-items:center;gap:14px}
.shift-big-btn.sel{border-color:#378ADD;background:#E6F1FB}
.shift-big-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.shift-big-name{font-size:16px;font-weight:600;color:#222}
.shift-big-btn.sel .shift-big-name{color:#185FA5}
.shift-big-time{font-size:12px;color:#999;margin-top:2px}
.shift-big-btn.sel .shift-big-time{color:#378ADD}
.pick-next-btn{margin-top:auto;padding:16px;background:#378ADD;color:#fff;border-radius:12px;font-size:16px;font-weight:600;opacity:.4;transition:opacity .2s}
.pick-next-btn.ready{opacity:1}

/* TL PICK */
.tl-pick-body{padding:20px;display:flex;flex-direction:column;gap:14px;flex:1}
.tl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tl-btn{padding:14px 8px;border:1.5px solid #e5e5e5;border-radius:10px;text-align:center;background:#fafafa;transition:all .15s}
.tl-btn.sel{border-color:#378ADD;background:#E6F1FB}
.tl-name{font-size:14px;font-weight:600;color:#222}
.tl-btn.sel .tl-name{color:#185FA5}
.tl-area{font-size:11px;color:#999;margin-top:3px}
.tl-btn.sel .tl-area{color:#378ADD}
.hc-row{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:12px;color:#888;display:block}
.hc-input{width:100%;padding:12px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:16px;color:#111}
.hc-input:focus{outline:none;border-color:#378ADD}
.start-btn{margin-top:auto;padding:16px;background:#378ADD;color:#fff;border-radius:12px;font-size:16px;font-weight:600;opacity:.4;transition:opacity .2s}
.start-btn.ready{opacity:1}

/* NAV DOTS */
.dot-nav{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid #f0f0f0;scrollbar-width:none;flex-shrink:0}
.dot-nav::-webkit-scrollbar{display:none}
.dot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0}
.dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #e5e5e5;background:#fafafa;font-size:12px;font-weight:600;color:#999;transition:all .15s}
.dot.active{border-color:#378ADD;background:#E6F1FB;color:#185FA5}
.dot.done{border-color:#3B6D11;background:#EAF3DE;color:#3B6D11}
.dot-lbl{font-size:10px;color:#aaa;text-align:center;max-width:38px;line-height:1.2}

/* CARD */
.card-area{flex:1;padding:14px;overflow-y:auto}
.section-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:10px;font-weight:500}
.tag-mine{background:#E6F1FB;color:#185FA5}
.tag-all{background:#f0f0f0;color:#666}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.section-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.section-title{font-size:17px;font-weight:600;color:#111}
.section-sub{font-size:12px;color:#888;margin-top:2px}
.item{display:flex;align-items:center;gap:12px;padding:13px 12px;margin-bottom:8px;border-radius:10px;border:1.5px solid #eeeeee;background:#fafafa;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.item.done{background:#EAF3DE;border-color:#b8d89a}
.item-check{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;transition:all .15s}
.item.done .item-check{background:#3B6D11;border-color:#3B6D11}
.checkmark{width:12px;height:12px;display:none}
.item.done .checkmark{display:block}
.item-body{flex:1}
.item-name{font-size:13px;font-weight:500;color:#111;line-height:1.4}
.item.done .item-name{color:#555}
.item-target{font-size:11px;color:#999;margin-top:2px}
.flag-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid #e5e5e5;background:#fafafa;font-size:13px;color:#888;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;transition:all .15s}
.flag-btn.flagged{background:#FCEBEB;border-color:#f5a5a5;color:#A32D2D}

/* BOTTOM NAV */
.bottom-nav{border-top:1px solid #f0f0f0;padding:10px 14px;display:flex;gap:8px;flex-shrink:0}
.prev-btn{padding:12px 18px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:16px;color:#666;background:#fafafa}
.next-btn{flex:1;padding:14px;border-radius:10px;background:#378ADD;color:#fff;font-size:16px;font-weight:600;transition:background .2s}
.next-btn.finish{background:#3B6D11}

/* DONE */
.done-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;text-align:center}
.done-circle{width:72px;height:72px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;font-size:36px}
.done-title{font-size:22px;font-weight:700;color:#111}
.done-sub{font-size:14px;color:#888;line-height:1.6}
.stats-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:#f7f7f7;border-radius:10px;padding:14px;text-align:center}
.stat-n{font-size:26px;font-weight:700;color:#111}
.stat-n.red{color:#A32D2D}
.stat-l{font-size:12px;color:#888;margin-top:3px}
.flags-box{width:100%;background:#FCEBEB;border-radius:10px;padding:12px 14px;text-align:left}
.flags-title{font-size:13px;font-weight:600;color:#A32D2D;margin-bottom:6px}
.flags-item{font-size:13px;color:#A32D2D;line-height:1.8}
.copy-btn{width:100%;padding:15px;background:#378ADD;color:#fff;border-radius:12px;font-size:16px;font-weight:600}
.restart-btn{width:100%;padding:13px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;color:#666;background:#fafafa}
.toast{background:#EAF3DE;color:#3B6D11;font-size:14px;padding:10px 16px;border-radius:10px;border:1px solid #b8d89a;font-weight:500}
</style>
</head>
<body>
<div id="root">

  <!-- SCREEN: PASSWORD -->
  <div id="screen-pw" class="screen active">
    <div class="pw-wrap">
      <div class="pw-logo"><div class="pw-logo-text">UB11</div></div>
      <div class="pw-title">Shift Briefing</div>
      <div class="pw-sub">Enter your PIN to continue</div>
      <div class="pw-dots" id="pw-dots">
        <div class="pw-dot"></div>
        <div class="pw-dot"></div>
        <div class="pw-dot"></div>
        <div class="pw-dot"></div>
      </div>
      <div class="pw-error" id="pw-error"></div>
      <div class="pw-keypad">
        <button class="pw-key" onclick="pwKey('1')">1</button>
        <button class="pw-key" onclick="pwKey('2')">2</button>
        <button class="pw-key" onclick="pwKey('3')">3</button>
        <button class="pw-key" onclick="pwKey('4')">4</button>
        <button class="pw-key" onclick="pwKey('5')">5</button>
        <button class="pw-key" onclick="pwKey('6')">6</button>
        <button class="pw-key" onclick="pwKey('7')">7</button>
        <button class="pw-key" onclick="pwKey('8')">8</button>
        <button class="pw-key" onclick="pwKey('9')">9</button>
        <button class="pw-key" onclick="pwKey('')"></button>
        <button class="pw-key" onclick="pwKey('0')">0</button>
        <button class="pw-key del" onclick="pwDel()">⌫</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: SHIFT PICK -->
  <div id="screen-shift" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">UB11 Shift Briefing</div>
        <div class="topbar-sub">Which shift are you briefing?</div>
      </div>
    </div>
    <div class="shift-pick-body">
      <div class="pick-title">Select your shift</div>
      <div class="pick-sub">This will show the right team leads</div>
      <div id="shift-options"></div>
      <button class="pick-next-btn" id="shift-next-btn" onclick="goToTLPick()">Select team lead →</button>
    </div>
  </div>

  <!-- SCREEN: TL PICK -->
  <div id="screen-tl" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="tl-pick-title">Select team lead</div>
        <div class="topbar-sub" id="tl-pick-sub">UB11</div>
      </div>
      <button class="change-btn" onclick="showScreen('shift')">← Shift</button>
    </div>
    <div class="tl-pick-body">
      <div class="tl-grid" id="tl-grid"></div>
      <div class="hc-row">
        <span class="field-label">Headcount</span>
        <input class="hc-input" type="number" inputmode="numeric" placeholder="e.g. 22" id="hc-input"/>
      </div>
      <button class="start-btn" id="start-btn" onclick="startBriefing()">Start briefing →</button>
    </div>
  </div>

  <!-- SCREEN: BRIEF -->
  <div id="screen-brief" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="brief-title">Briefing</div>
        <div class="topbar-sub" id="brief-sub">UB11</div>
      </div>
      <button class="change-btn" onclick="showScreen('tl')">Change</button>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar"></div></div>
    <div class="dot-nav" id="dot-nav"></div>
    <div class="card-area" id="card-area"></div>
    <div class="bottom-nav">
      <button class="prev-btn" id="prev-btn" onclick="goSection(-1)">←</button>
      <button class="next-btn" id="next-btn" onclick="goSection(1)">Next →</button>
    </div>
  </div>

  <!-- SCREEN: DONE -->
  <div id="screen-done" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">Briefing complete</div>
        <div class="topbar-sub" id="done-sub2"></div>
      </div>
    </div>
    <div class="done-body">
      <div class="done-circle">✓</div>
      <div class="done-title">All done</div>
      <div class="done-sub" id="done-meta"></div>
      <div class="stats-grid" id="done-stats"></div>
      <div class="flags-box" id="done-flags" style="display:none"></div>
      <button class="copy-btn" onclick="copyLog()">Copy briefing log</button>
      <div id="sheet-status" style="font-size:13px;color:#888;min-height:18px"></div>
      <button class="restart-btn" onclick="restart()">New briefing</button>
      <div class="toast" id="toast" style="display:none">✓ Copied to clipboard</div>
    </div>
  </div>

</div>
<script>
const PIN = "1234"; // ← change this to your PIN

// ── TL data ──────────────────────────────────────────────────────────────────
const TL_PROFILES = {
  // NIGHT SORT TLs
  gayan:{  shift:"night", name:"Gayan",  area:"Night TPH & Sort TP",          color:"#E6F1FB", fg:"#185FA5",
    kpis:[
      {name:"Night Sort TPH",              target:"Target: 270 TPH"},
      {name:"Sort TP (total parcels)",     target:"Check vs volume expected"},
      {name:"Sort start time on track",    target:"Sort start confirmed on time"},
      {name:"All presorts active",         target:"All presort positions live before sort"},
    ]},
  yass:{   shift:"night", name:"Yass",   area:"Sorted first hour",            color:"#E6F1FB", fg:"#185FA5",
    kpis:[
      {name:"Sorted in 1st hour",          target:"Target: 25,000 parcels"},
      {name:"1st hour momentum vs target", target:"On track by 30-min check?"},
      {name:"Feeder staffing adequate",    target:"All positions covered for peak hour"},
    ]},
  rasika:{ shift:"night", name:"Rasika", area:"Staging",                      color:"#EEEDFE", fg:"#534AB7",
    kpis:[
      {name:"First bag staged time",       target:"Target: 22:00"},
      {name:"% of bags misstaged",         target:"Target: ≤1.5%"},
      {name:"Staging completion on track", target:"Target: 04:00"},
      {name:"Avg time to fix misstaged bag",target:"Check vs previous shift"},
    ]},
  imasha:{ shift:"night", name:"Imasha", area:"Loading & vans",               color:"#EEEDFE", fg:"#534AB7",
    kpis:[
      {name:"First Van Loading scan",      target:"Target: 04:30"},
      {name:"Last Van Departed",           target:"Target: 06:30"},
      {name:"% of Vans Out by 06:30",      target:"Target: 95%"},
      {name:"Total Vans Loaded",           target:"Check vs planned"},
      {name:"Vans arriving after cutoff",  target:"Target: 0 — flag any late arrivals"},
    ]},
  // Nights — shared KPIs
  amila:{  shift:"both",  name:"Amila",  area:"Scan compliance & missorts",   color:"#FAECE7", fg:"#993C1D",
    kpis:[
      {name:"Missort % RAG",               target:"Target: ≤0.15%"},
      {name:"Total missorts",              target:"Review count vs previous shift"},
      {name:"International Box Scan %",    target:"Target: ≥99.8%"},
      {name:"Missing International %",     target:"Target: ≤0.5%"},
      {name:"Unexpected International %",  target:"Target: ≤0.5%"},
      {name:"Box scan audit done",         target:"Spot check at least 2 operatives"},
    ]},
  // DAY SORT TLs
  bharti:{ shift:"day",   name:"Bharti", area:"Desk, RTS & Day desk TPH",     color:"#E6F1FB", fg:"#185FA5",
    kpis:[
      {name:"Desk relabelling TPH",        target:"Target: 700 TPH"},
      {name:"Night Desk Throughput",       target:"Check vs previous shift"},
      {name:"Day Desk Throughput",         target:"Check vs previous shift"},
      {name:"RTS parcel accuracy",         target:"All RTS correctly labelled & staged"},
      {name:"No backlog at desk station",  target:"Queue cleared within window"},
    ]},
  ronak:{  shift:"day",   name:"Ronak",  area:"Assets & MM Returns",          color:"#EEEDFE", fg:"#534AB7",
    kpis:[
      {name:"Asset forms completed",       target:"All magnums/cages logged on handover"},
      {name:"MM returns accuracy",         target:"Returns matched — no discrepancies"},
      {name:"No MM backlog",               target:"All MM processed before shift end"},
      {name:"Magnum cage balance checked", target:"UB11 vs NG15 gap reviewed"},
      {name:"Intercity movements logged",  target:"All inbound/outbound cages recorded"},
    ]},
  dipen:{  shift:"day",   name:"Dipen",  area:"Day sort",                     color:"#FAEEDA", fg:"#854F0B",
    kpis:[
      {name:"Day Volume Expected vs Sorted",target:"Target: 26,000 parcels"},
      {name:"Day Sort TPH",                target:"Target: 300 TPH"},
      {name:"Day Sort Finish Time RAG",    target:"On track?"},
      {name:"Day Sort Finish Time",        target:"Check vs target window"},
      {name:"Day Missing %",              target:"Target: ≤1%"},
      {name:"Day Missort %",              target:"Target: ≤0.15%"},
      {name:"Total Day Missorts",          target:"Review count vs previous shift"},
    ]},
  vishv:{  shift:"day",   name:"Vishv",  area:"Day sort",                     color:"#FAEEDA", fg:"#854F0B",
    kpis:[
      {name:"Day Sort TPH",                target:"Target: 300 TPH"},
      {name:"Day volume sorted vs expected",target:"Target: 26,000 parcels"},
      {name:"Day sort finish time RAG",    target:"On track?"},
      {name:"Day Missing %",              target:"Target: ≤1%"},
      {name:"Day Missort %",              target:"Target: ≤0.15%"},
      {name:"Day robot throughput",        target:"Baseline: 9,500 TPH"},
    ]},
  singh:{  shift:"day",   name:"Singh",  area:"Day sort",                     color:"#FAEEDA", fg:"#854F0B",
    kpis:[
      {name:"Day Sort TPH",                target:"Target: 300 TPH"},
      {name:"Day volume sorted vs expected",target:"Target: 26,000 parcels"},
      {name:"Day sort finish time RAG",    target:"On track?"},
      {name:"Day Missing %",             target:"Target: ≤1%"},
      {name:"Vinted arrived by 16:00 & presorted",target:"On track vs window?"},
      {name:"Sorted in 1st hour",          target:"Check momentum vs target"},
    ]},
  agha:{   shift:"day",   name:"Agha",   area:"Presort, robots & day missing",color:"#E1F5EE", fg:"#0F6E56",
    kpis:[
      {name:"Day Robot Throughput",        target:"Baseline: 9,500 TPH"},
      {name:"Day Missing %",             target:"Target: ≤1% — shared with Dipen"},
      {name:"Presort windows on time",     target:"All windows on schedule"},
      {name:"Robot feeder positions staffed",target:"No uncovered feeder positions"},
      {name:"Robot downtime — any to flag?",target:"Escalate immediately if offline"},
    ]},
};

const SHIFTS = [
  { key:"night", label:"Night sort", time:"20:30 – 06:30", icon:"🌙" },
  { key:"day",   label:"Day sort",   time:"06:00 – 21:00", icon:"☀️"  },
];

const GENERIC = [
  { id:"hs",      label:"H&S",     title:"Health & safety",     icon:"🛡️", bg:"#FCEBEB",
    items:[
      "Emergency exits clear and signage visible",
      "Fire assembly point communicated to team",
      "First aid kit & first aider identified",
      "PPE requirements briefed (hi-vis, steel toe-caps)",
      "Hazards on the floor today flagged",
      "Forklift & vehicle crossing points highlighted",
      "Manual handling reminder for heavy parcels",
      "Incident & near-miss reporting reminded",
    ]},
  { id:"targets", label:"Targets", title:"Shift targets",       icon:"🎯", bg:"#E6F1FB",
    items:[
      "Sort volume target shared with team",
      "Night sort TPH target briefed (270)",
      "Missort rate target (0.15%) communicated",
      "Box scanning target (99.8%) reminded",
      "First bag staged time confirmed (22:00)",
      "Staging completion & vans out milestones shared",
    ]},
  { id:"scan",    label:"Scan",    title:"Scan compliance",     icon:"📦", bg:"#E1F5EE",
    items:[
      "Missing International % — reviewed (target ≤0.5%)",
      "Unexpected International % — reviewed (target ≤0.5%)",
      "Missing Domestic % (sort controllable) — reviewed",
      "Unexpected Domestic % (sort controllable) — reviewed",
      "Operatives reminded: scan every parcel before sorting",
      "Scan failures from last shift discussed with team",
    ]},
  { id:"floor",   label:"Floor",   title:"Cleanliness & floor", icon:"✨", bg:"#FAEEDA",
    items:[
      "Start-of-shift floor sweep done or delegated",
      "No parcels on the floor — belt or racking only",
      "Cardboard & waste disposal points reminded",
      "Damaged parcel procedure reminded",
      "Cage & magnum return discipline briefed",
      "End-of-shift clean-down responsibilities set",
    ]},
  { id:"people",  label:"People",  title:"People & conduct",    icon:"👥", bg:"#EEEDFE",
    items:[
      "Attendance checked — latecomers plan set",
      "New starters / agency workers buddied up",
      "Respect & zero-tolerance reminder given",
      "Phone policy on the floor reminded",
      "Welfare check — known issues flagged to manager",
    ]},
];

// ── State ────────────────────────────────────────────────────────────────────
let state = { shift:null, tlKey:null, hc:"", cur:0, checks:{}, flags:{}, sections:[] };
let pwEntry = "";

// ── PASSWORD ─────────────────────────────────────────────────────────────────
function pwKey(d){ if(!d) return; if(pwEntry.length>=4) return; pwEntry+=d; renderDots(); if(pwEntry.length===4) setTimeout(checkPin,120); }
function pwDel(){ pwEntry=pwEntry.slice(0,-1); renderDots(); document.getElementById("pw-error").textContent=""; }
function renderDots(){
  document.querySelectorAll(".pw-dot").forEach((dot,i)=>{
    dot.classList.toggle("filled", i<pwEntry.length);
    dot.classList.remove("error");
  });
}
function checkPin(){
  if(pwEntry===PIN){ showScreen("shift"); buildShiftPicker(); }
  else {
    document.querySelectorAll(".pw-dot").forEach(d=>{ d.classList.remove("filled"); d.classList.add("error"); });
    document.getElementById("pw-error").textContent="Incorrect PIN — try again";
    setTimeout(()=>{ pwEntry=""; renderDots(); },600);
  }
}

// ── SHIFT PICKER ─────────────────────────────────────────────────────────────
function buildShiftPicker(){
  const el = document.getElementById("shift-options");
  el.innerHTML="";
  SHIFTS.forEach(s=>{
    const btn = document.createElement("button");
    btn.className="shift-big-btn";
    btn.style.width="100%";
    btn.style.marginBottom="10px";
    btn.innerHTML=`<div class="shift-big-icon" style="background:${s.key==="night"?"#1a56a0":"#FAEEDA"}">${s.icon}</div><div><div class="shift-big-name">${s.label}</div><div class="shift-big-time">${s.time}</div></div>`;
    btn.onclick=()=>{
      document.querySelectorAll(".shift-big-btn").forEach(b=>b.classList.remove("sel"));
      btn.classList.add("sel");
      state.shift=s.key;
      document.getElementById("shift-next-btn").classList.add("ready");
    };
    el.appendChild(btn);
  });
}

function goToTLPick(){
  if(!state.shift) return;
  const shiftLabel = SHIFTS.find(s=>s.key===state.shift).label;
  document.getElementById("tl-pick-title").textContent = shiftLabel+" team leads";
  document.getElementById("tl-pick-sub").textContent = "Tap your name";
  buildTLGrid();
  showScreen("tl");
}

// ── TL PICKER ─────────────────────────────────────────────────────────────────
function buildTLGrid(){
  const grid = document.getElementById("tl-grid");
  grid.innerHTML="";
  state.tlKey=null;
  document.getElementById("start-btn").classList.remove("ready");
  const filtered = Object.entries(TL_PROFILES).filter(([,tl])=>tl.shift===state.shift||tl.shift==="both");
  filtered.forEach(([key,tl])=>{
    const b = document.createElement("button");
    b.className="tl-btn";
    b.innerHTML=`<div class="tl-name">${tl.name}</div><div class="tl-area">${tl.area}</div>`;
    b.onclick=()=>{ document.querySelectorAll(".tl-btn").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); state.tlKey=key; checkReady(); };
    grid.appendChild(b);
  });
  document.getElementById("hc-input").oninput=checkReady;
}

function checkReady(){
  document.getElementById("start-btn").classList.toggle("ready", !!state.tlKey);
}

// ── START BRIEFING ────────────────────────────────────────────────────────────
function startBriefing(){
  if(!state.tlKey) return;
  state.hc = document.getElementById("hc-input").value || "—";
  state.cur=0; state.checks={}; state.flags={};
  const tl = TL_PROFILES[state.tlKey];
  const shiftLabel = SHIFTS.find(s=>s.key===state.shift).label;
  state.sections=[
    {id:"kpis",label:"My KPIs",title:"Your KPIs — "+tl.name,icon:"📊",bg:tl.color,isKpi:true,kpis:tl.kpis},
    ...GENERIC
  ];
  document.getElementById("brief-title").textContent=tl.name+"'s briefing";
  document.getElementById("brief-sub").textContent=shiftLabel+" · "+new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  showScreen("brief");
  renderNav();
  renderCard();
}

// ── SCREENS ──────────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
}

// ── NAV DOTS ─────────────────────────────────────────────────────────────────
function renderNav(){
  const nav=document.getElementById("dot-nav");
  nav.innerHTML="";
  let td=0,ta=0;
  state.sections.forEach((s,i)=>{
    const items=s.isKpi?s.kpis:s.items;
    const done=items.filter((_,j)=>state.checks[s.id+"-"+j]).length;
    td+=done; ta+=items.length;
    const allDone=done===items.length, isActive=i===state.cur;
    const wrap=document.createElement("div"); wrap.className="dot-wrap";
    wrap.onclick=()=>{state.cur=i;renderNav();renderCard();};
    const dot=document.createElement("div");
    dot.className="dot"+(isActive?" active":allDone?" done":"");
    dot.textContent=allDone&&!isActive?"✓":(i+1);
    const lbl=document.createElement("div"); lbl.className="dot-lbl"; lbl.textContent=s.label;
    wrap.appendChild(dot); wrap.appendChild(lbl); nav.appendChild(wrap);
  });
  document.getElementById("prog-bar").style.width=ta?Math.round(td/ta*100)+"%":"0%";
}

// ── CARD ─────────────────────────────────────────────────────────────────────
function renderCard(){
  const s=state.sections[state.cur];
  const items=s.isKpi?s.kpis:s.items;
  const secDone=items.filter((_,j)=>state.checks[s.id+"-"+j]).length;
  const isLast=state.cur===state.sections.length-1;
  const isMine=s.id==="kpis";
  let html=`<span class="section-tag ${isMine?"tag-mine":"tag-all"}">${isMine?"Your area":"All TLs"}</span>
    <div class="section-head">
      <div class="section-icon" style="background:${s.bg||s.color}">${s.icon}</div>
      <div><div class="section-title">${s.title}</div>
      <div class="section-sub">Section ${state.cur+1} of ${state.sections.length} · ${secDone}/${items.length}</div></div>
    </div>`;
  items.forEach((item,j)=>{
    const done=!!state.checks[s.id+"-"+j];
    const name=s.isKpi?item.name:item;
    const target=s.isKpi?item.target:"";
    html+=`<div class="item${done?" done":""}" onclick="toggleItem('${s.id}',${j})">
      <div class="item-check"><svg class="checkmark" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#EAF3DE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="item-body"><div class="item-name">${name}</div>${target?`<div class="item-target">${target}</div>`:""}</div>
    </div>`;
  });
  const flagged=!!state.flags[s.id];
  html+=`<button class="flag-btn${flagged?" flagged":""}" onclick="toggleFlag('${s.id}')">⚠ ${flagged?"Issue flagged — tap to clear":"Flag an issue in this section"}</button>`;
  document.getElementById("card-area").innerHTML=html;
  document.getElementById("prev-btn").style.visibility=state.cur===0?"hidden":"visible";
  const nb=document.getElementById("next-btn");
  nb.textContent=isLast?"Complete briefing ✓":"Next →";
  nb.className="next-btn"+(isLast&&secDone===items.length?" finish":"");
}

function toggleItem(sid,j){ state.checks[sid+"-"+j]=!state.checks[sid+"-"+j]; renderNav(); renderCard(); }
function toggleFlag(sid){ state.flags[sid]=!state.flags[sid]; renderCard(); }

function goSection(dir){
  if(dir===1&&state.cur===state.sections.length-1){ finishBriefing(); return; }
  state.cur=Math.max(0,Math.min(state.sections.length-1,state.cur+dir));
  renderNav(); renderCard();
  document.getElementById("card-area").scrollTop=0;
}

// ── FINISH ────────────────────────────────────────────────────────────────────
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzFQTXuKGGpyTYjCVaP1jMHM3RLhiDTEitBBnfxLfHTheED7iXs0o4Ikre6iX1kg49G/exec";

function finishBriefing(){
  let ta=0,td=0;
  state.sections.forEach(s=>{ const it=s.isKpi?s.kpis:s.items; ta+=it.length; td+=it.filter((_,j)=>state.checks[s.id+"-"+j]).length; });
  const flagged=state.sections.filter(s=>state.flags[s.id]);
  const tl=TL_PROFILES[state.tlKey];
  const shiftLabel=SHIFTS.find(s=>s.key===state.shift).label;
  const dateStr=new Date().toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});

  // Build missed items list
  const missed=[];
  state.sections.forEach(s=>{ const items=s.isKpi?s.kpis.map(k=>k.name):s.items; items.forEach((item,j)=>{ if(!state.checks[s.id+"-"+j]) missed.push(item); }); });
  const flaggedNames=flagged.map(s=>s.title).join(", ");

  document.getElementById("done-sub2").textContent=tl.name+" · "+shiftLabel;
  document.getElementById("done-meta").textContent=tl.name+" · "+shiftLabel+" · HC: "+state.hc+" · "+dateStr;
  document.getElementById("done-stats").innerHTML=`<div class="stat-card"><div class="stat-n">${td}/${ta}</div><div class="stat-l">Items covered</div></div><div class="stat-card"><div class="stat-n${flagged.length?" red":""}">${flagged.length}</div><div class="stat-l">Issues flagged</div></div>`;
  const fb=document.getElementById("done-flags");
  if(flagged.length){ fb.style.display="block"; fb.innerHTML=`<div class="flags-title">⚠ Escalate to ops manager</div>`+flagged.map(s=>`<div class="flags-item">· ${s.title}</div>`).join(""); }
  else fb.style.display="none";
  document.getElementById("prog-bar").style.width="100%";
  showScreen("done");

  // Post to Google Sheet via JSONP (only method that works cross-origin with Apps Script)
  if(SHEET_URL && SHEET_URL !== "PASTE_YOUR_APPS_SCRIPT_URL_HERE"){
    const params = new URLSearchParams({
      timestamp:        new Date().toISOString(),
      tl:               tl.name,
      area:             tl.area,
      shift:            shiftLabel,
      headcount:        state.hc,
      items_checked:    td,
      items_total:      ta,
      pct_complete:     Math.round(td/ta*100),
      issues_flagged:   flagged.length,
      flagged_sections: flaggedNames || "None",
      missed_items:     missed.join(" | ") || "All complete",
      callback:         "briefingCallback",
    });
    window.briefingCallback = function(response){
      const el = document.getElementById("sheet-status");
      if(response && response.result === "success"){
        el.textContent = "✓ Saved to Google Sheet";
        el.style.color = "#3B6D11";
      } else {
        el.textContent = "⚠ Could not save to sheet — copy log manually";
        el.style.color = "#A32D2D";
      }
      // Clean up script tag
      const old = document.getElementById("jsonp-briefing");
      if(old) old.remove();
    };
    // Set a timeout in case script never loads
    setTimeout(()=>{
      const el = document.getElementById("sheet-status");
      if(!el.textContent){
        el.textContent = "⚠ Could not save to sheet — copy log manually";
        el.style.color = "#A32D2D";
      }
    }, 8000);
    const script = document.createElement("script");
    script.id = "jsonp-briefing";
    script.src = SHEET_URL + "?" + params.toString();
    document.body.appendChild(script);
  }
}

function copyLog(){
  const tl=TL_PROFILES[state.tlKey];
  const shiftLabel=SHIFTS.find(s=>s.key===state.shift).label;
  const dateStr=new Date().toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
  const lines=["UB11 SHIFT BRIEFING LOG","========================",`TL: ${tl.name}  |  Shift: ${shiftLabel}  |  HC: ${state.hc}  |  ${dateStr}`,""];
  state.sections.forEach(s=>{ const items=s.isKpi?s.kpis.map(k=>k.name):s.items; const done=items.filter((_,j)=>state.checks[s.id+"-"+j]).length; lines.push(`${s.title} (${done}/${items.length})${state.flags[s.id]?" ⚠ ISSUE FLAGGED":""}`); items.forEach((item,j)=>lines.push(`  ${state.checks[s.id+"-"+j]?"[x]":"[ ]"} ${item}`)); lines.push(""); });
  navigator.clipboard.writeText(lines.join("\n")).then(()=>{ const t=document.getElementById("toast"); t.style.display="block"; setTimeout(()=>t.style.display="none",2500); }).catch(()=>{});
}

function restart(){
  state={shift:null,tlKey:null,hc:"",cur:0,checks:{},flags:{},sections:[]};
  pwEntry=""; renderDots();
  document.getElementById("pw-error").textContent="";
  document.getElementById("prog-bar").style.width="0%";
  showScreen("pw");
}
</script>
</body>
</html>
